# =============================================================================
# docker-compose.yml – DC Trade Toolbox
# 
# EINFACH STARTEN (SQLite – kein Setup nötig):
#   docker compose up -d
#
# MIT PostgreSQL (optional):
#   docker compose --profile db up -d
# =============================================================================

services:
  # ---------- Main application (Streamlit + FastAPI) ----------
  app:
    image: dc-trade:latest
    build:
      context: .
      # BuildKit is auto-enabled in Docker v24+.
      # For older Docker, set DOCKER_BUILDKIT=1 in your shell:
      #   DOCKER_BUILDKIT=1 docker compose build
    container_name: dc-trade
    restart: unless-stopped
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"   # Streamlit web UI
      - "${API_PORT:-8000}:8000"         # FastAPI REST API
    environment:
      - DC_API_KEY=${DC_API_KEY:-}
      - COMPANY_NAME=${COMPANY_NAME:-Fishy Business}
      - STREAMLIT_PORT=${STREAMLIT_PORT:-8501}
      - API_PORT=${API_PORT:-8000}
      # Discord OAuth — passed from host .env file
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI:-http://localhost:8501/}
      - ADMIN_DISCORD_IDS=${ADMIN_DISCORD_IDS:-}
      - TRIAL_DAYS=${TRIAL_DAYS:-3}
      - SESSION_SECRET=${SESSION_SECRET:-}
    volumes:
      - dc_trade_data:/app/data

  # ---------- PostgreSQL (optional – für Produktion) ----------
  postgres:
    image: postgres:16-alpine
    container_name: dc-trade-db
    restart: unless-stopped
    profiles:
      - db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dctrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-dctrade}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dctrade"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dc_trade_data:
  postgres_data:
