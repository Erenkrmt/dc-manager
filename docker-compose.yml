# =============================================================================
# docker-compose.yml – DC Trade Toolbox
#
# Deploy on Dockge: paste this file, then set environment variables.
# The app pulls the pre-built image from GHCR.
#
# PostgreSQL (optional):
#   docker compose --profile db up -d
# =============================================================================

services:
  # ---------- Main application (Streamlit + FastAPI) ----------
  app:
    image: ghcr.io/erenkrmt/dc-trade:latest
    container_name: dc-trade
    restart: unless-stopped
    pull_policy: always
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"   # Streamlit web UI
      - "${API_PORT:-8000}:8000"         # FastAPI REST API
    depends_on:
      postgres:
        condition: service_healthy
        required: false                  # graceful fallback to SQLite
    environment:
      - DC_API_KEY=${DC_API_KEY:-}
      - COMPANY_NAME=${COMPANY_NAME:-Fishy Business}
      - STREAMLIT_PORT=${STREAMLIT_PORT:-8501}
      - API_PORT=${API_PORT:-8000}
      # Discord OAuth — passed from host .env file
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI:-http://localhost:8501/}
      - ADMIN_DISCORD_IDS=${ADMIN_DISCORD_IDS:-}
      - TRIAL_DAYS=${TRIAL_DAYS:-3}
      - SESSION_SECRET=${SESSION_SECRET:-}
      # SSL / TLS — mount certs volume externally and set paths
      - SSL_ENABLED=${SSL_ENABLED:-false}
      - SSL_CERTFILE=${SSL_CERTFILE:-}
      - SSL_KEYFILE=${SSL_KEYFILE:-}
      # PostgreSQL connection
      - DATABASE_URL=${DATABASE_URL:-}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-}
      # PostgreSQL SSL mode (disable, require, verify-full, etc. — empty = auto-detect)
      - DATABASE_SSLMODE=${DATABASE_SSLMODE:-}
    volumes:
      - dc_trade_data:/app/data
      # Uncomment below and adjust paths to mount SSL certificates:
      # - ./certs:/app/certs:ro
    labels:
      - "org.dockge.name=DC Trade Toolbox"
      - "org.dockge.description=DemocracyCraft Trading Toolbox – Bulk trading calculator, shulker scanner & unit converter"
      - "org.dockge.category=Tools"

  # ---------- PostgreSQL (optional – für Produktion) ----------
  postgres:
    image: postgres:16-alpine
    container_name: dc-trade-db
    restart: unless-stopped
    profiles:
      - db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dctrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-dctrade}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dctrade"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dc_trade_data:
  postgres_data: