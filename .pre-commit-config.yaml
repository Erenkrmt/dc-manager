repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: encrypt-env
        name: Encrypt .env
        entry: python scripts/pre-commit-hook.py
        language: system
        pass_filenames: false
        files: ^\.env$