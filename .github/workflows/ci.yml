# =============================================================================
# ci.yml – Continuous Integration (Lint, Test, Build, SonarCloud)
#
# Runs on:
#   - pull_request (any branch)
#   - push to feature/*
#   - workflow_call (reusable from docker-publish.yml)
#
# Does NOT push Docker images – only validates that the build works.
# SonarCloud runs on ubuntu (cheaper + faster) with PR decoration.
# =============================================================================

name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - feature/*
  workflow_call:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/erenkrmt/dc-trade

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Run ruff linter
        run: uv run ruff check src/ tests/

      - name: Run ruff formatter check
        run: uv run ruff format --check src/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          tags: ${{ env.IMAGE_NAME }}:test-${{ github.sha }}

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    # Run parallel to the other jobs
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.event.pull_request.head.ref }}
            -Dsonar.pullrequest.base=${{ github.event.pull_request.base.ref }}