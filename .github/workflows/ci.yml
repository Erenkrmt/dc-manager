name: CI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/erenkrmt/dc-trade

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - feature/*
  workflow_call:
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      SONAR_HOST_URL:
        required: true
      SONAR_TOKEN:
        required: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        run: pip install "uv>=0.5,<1"

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install Python
        run: uv python install $(cat .python-version)

      - name: Install dependencies (including dev)
        run: uv sync --extra dev

      - name: Run ruff linter
        run: uv run ruff check src/ tests/
      - name: Run ruff formatter check
        run: uv run ruff format --check src/ tests/

  test:
    name: Test
    runs-on: self-hosted
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        run: pip install "uv>=0.5,<1"

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install Python
        run: uv python install $(cat .python-version)

      - name: Install dependencies (including dev)
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build Test
    runs-on: self-hosted
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha,scope=dc-trade
          cache-to: type=gha,mode=max,scope=dc-trade
          tags: ${{ env.IMAGE_NAME }}:test-${{ github.sha }}

  sonarqube:
    name: Code Quality Scan
    runs-on: [self-hosted, linux, x64]
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .