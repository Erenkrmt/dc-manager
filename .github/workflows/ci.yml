# =============================================================================
# ci.yml – Continuous Integration (Lint, Test, Build, SonarCloud)
#
# Runs on:
#   - pull_request (any branch)
#   - push to feature/*
#   - workflow_call (reusable from docker-publish.yml)
#
# Does NOT push Docker images – only validates that the build works.
# All jobs run on the self-hosted runner.
# =============================================================================

name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - feature/*
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/erenkrmt/dc-trade

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: uv.lock

      - name: Install uv
        run: pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync

      - name: Run ruff linter
        run: uv run ruff check src/ tests/
      - name: Run Ruff formatter format
        run: uv run ruff format src/ tests/
      - name: Run ruff formatter check
        run: uv run ruff format --check src/ tests/

  test:
    name: Test
    runs-on: self-hosted
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: uv.lock

      - name: Install uv
        run: pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build Test
    runs-on: self-hosted
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha,scope=dc-trade
          cache-to: type=gha,mode=max,scope=dc-trade
          tags: ${{ env.IMAGE_NAME }}:test-${{ github.sha }}

  sonarqube:
    name: Code Quality Scan
    runs-on: [self-hosted, linux, x64]
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
