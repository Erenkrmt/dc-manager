# =============================================================================
# docker-publish.yml – Build & push DC Trade Docker image to GHCR
#
# Triggers (only when relevant files change on master):
#   - push to master with changes in src/, scripts/, Dockerfile, requirements.txt
#   - manual workflow_dispatch
#
# Only runs after CI (lint + test) passes.
# The resulting image is tagged:
#   ghcr.io/erenkrmt/dc-trade:latest
#   ghcr.io/erenkrmt/dc-trade:<git-sha>
# =============================================================================

name: Build & Push Docker Image

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "scripts/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/ci.yml"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/erenkrmt/dc-trade

jobs:
  ci:
    name: CI (Lint + Test)
    uses: ./.github/workflows/ci.yml

  build-and-push:
    # existing steps above...
    # (no change)

  cache-report:
    name: Cache Report
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install GitHub CLI
        run: |
          sudo apt-get update && sudo apt-get install -y gh
      - name: List GitHub caches
        run: |
          gh auth status
          gh actions-cache list -R ${{ github.repository }} > cache-report.txt
      - name: Upload cache report
        uses: actions/upload-artifact@v4
        with:
          name: cache-report
          path: cache-report.txt
    runs-on: self-hosted
    needs: ci
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=dc-trade
          cache-to: type=gha,mode=max,scope=dc-trade
          provenance: true
          sbom: true
      - name: Show Docker cache status
        run: |
          echo "Cache hit: ${{ steps.build-and-push.outputs.cache-hit }}"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
