# =============================================================================
# docker-publish.yml – Build & push DC Trade Docker image to GHCR
#
# Triggers (only when relevant files change on master):
#   - push to master with changes in src/, scripts/, Dockerfile, requirements.txt
#   - manual workflow_dispatch
#
# Only runs after CI (lint + test) passes.
# The resulting image is tagged:
#   ghcr.io/erenkrmt/dc-trade:latest
#   ghcr.io/erenkrmt/dc-trade:<git-sha>
# =============================================================================

name: Build & Push Docker Image

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "scripts/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "Dockerfile"
      - ".dockerignore"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/erenkrmt/dc-trade

jobs:
  ci:
    name: CI (Lint + Test)
    uses: ./.github/workflows/ci.yml

  build-and-push:
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
